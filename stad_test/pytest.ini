[pytest]
# Use the dedicated test settings module.  It disables django-axes (avoids
# AxesBackendRequestParameterRequired during client.login()) and uses plain
# StaticFilesStorage (avoids `Missing staticfiles manifest entry` errors when
# `static/` has not been built via collectstatic / gulp build).
DJANGO_SETTINGS_MODULE = babybuddy.settings.test
python_files = test_*.py *_test.py
addopts = -ra
xfail_strict = true
markers =
    found_bug: test documents a discovered project bug
